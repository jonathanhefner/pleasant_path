name: CI
on: [push, pull_request]
jobs:
  tests:
    strategy:
      matrix:
        ruby: ["3.4", "4.0"]
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: bundle exec rake test
